name: Deploy Wiki

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/fastee-wiki
            git pull origin main
            docker build -t fastee-wiki .
            docker stop fastee-wiki || true
            docker rm fastee-wiki || true
            docker run -d \
              --name fastee-wiki \
              --restart unless-stopped \
              -p 127.0.0.1:8080:80 \
              fastee-wiki
